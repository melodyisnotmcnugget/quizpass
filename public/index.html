<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f8fafc">
  <title>QizzPass</title>
  <link rel="icon" type="image/x-icon" sizes="64x64" href="thumb.ico?v=1">
  <link rel="shortcut icon" href="thumb.ico?v=1">
  <link rel="apple-touch-icon" href="thumb.ico?v=1">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: rgba(255, 255, 255, 0.86);
      --surface-solid: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: rgba(15, 23, 42, 0.1);
      --primary: #2563eb;
      --primary-2: #0ea5e9;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #f59e0b;
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.10);
      --radius-lg: 28px;
      --radius-md: 18px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 12%, rgba(37, 99, 235, 0.16), transparent 30%),
        radial-gradient(circle at 86% 0%, rgba(14, 165, 233, 0.18), transparent 32%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 42%, #eef4ff 100%);
      line-height: 1.6;
    }

    button, input, textarea { font: inherit; }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 18px;
      color: #ffffff;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      cursor: pointer;
      font-weight: 700;
      letter-spacing: -0.01em;
      box-shadow: 0 12px 22px rgba(37, 99, 235, 0.18);
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }

    button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 16px 28px rgba(37, 99, 235, 0.24); }
    button:active:not(:disabled) { transform: translateY(0); }
    button:disabled { cursor: not-allowed; opacity: 0.48; box-shadow: none; }

    .app-shell { width: min(920px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 80px; }

    .hero {
      margin-top: 12px;
    }

    .card {
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.76);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px) saturate(150%);
      -webkit-backdrop-filter: blur(22px) saturate(150%);
    }

    .composer { padding: 20px; }
    .composer-header { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 14px; }
    .composer h2, .quiz-title h2, .modal h2 { margin: 0; letter-spacing: -0.035em; line-height: 1.1; }
    .muted { color: var(--muted); margin: 5px 0 0; font-size: 14px; }
    .prompt-hint { margin: 8px 0 0; color: #98a2b3; font-size: 12px; line-height: 1.5; }
    .prompt-copy { color: #667085; text-decoration: underline; text-underline-offset: 3px; cursor: pointer; background: none; border: 0; padding: 0; box-shadow: none; font-size: inherit; font-weight: 650; }
    .prompt-copy:hover { color: var(--primary); transform: none; box-shadow: none; }

    textarea {
      display: block;
      width: 100%;
      min-height: 310px;
      resize: vertical;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 22px;
      outline: none;
      background: rgba(255,255,255,0.88);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 14px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    textarea:focus, #chat-input:focus { border-color: rgba(37, 99, 235, 0.45); box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.10); }

    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .secondary { background: #111827; box-shadow: 0 12px 22px rgba(17, 24, 39, 0.14); }
    .ghost { color: #1f2937; background: rgba(255,255,255,0.9); border: 1px solid var(--line); box-shadow: none; }
    .success-btn { background: linear-gradient(135deg, #16a34a, #22c55e); }
    .purple-btn { background: linear-gradient(135deg, #7c3aed, #a855f7); }
    .danger-btn { background: linear-gradient(135deg, #dc2626, #f97316); }

    #quiz-container { display: none; margin-top: 24px; padding: 24px; position: relative; }
    .quiz-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; margin-bottom: 18px; }
    .quiz-title { min-width: 0; }
    #q-num { color: #1d4ed8; font-weight: 850; font-size: 14px; margin-bottom: 6px; }
    #question-text { margin: 0; font-size: clamp(21px, 3vw, 32px); font-weight: 850; line-height: 1.25; letter-spacing: -0.04em; }
    #top-btns { display: flex; gap: 8px; flex-shrink: 0; }
    .icon-btn { width: 44px; height: 44px; padding: 0; display: inline-grid; place-items: center; color: #1f2937; background: rgba(255,255,255,0.92); border: 1px solid var(--line); box-shadow: none; font-size: 18px; }
    .icon-btn.faved { color: #d97706; background: #fff7ed; border-color: rgba(245, 158, 11, 0.35); }

    #options-area { display: grid; gap: 12px; margin: 20px 0; }
    .option {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 13px;
      align-items: flex-start;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.78);
      cursor: pointer;
      transition: border-color 0.16s ease, transform 0.16s ease, background 0.16s ease;
    }
    .option:hover { transform: translateY(-1px); border-color: rgba(37,99,235,0.32); background: #ffffff; }
    .option:has(input:checked) { border-color: rgba(37,99,235,0.62); background: #eff6ff; }
    .option input { width: 18px; height: 18px; margin-top: 3px; accent-color: var(--primary); }
    .option strong { margin-right: 4px; color: #1d4ed8; }

    .quiz-actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 18px; }
    .feedback { margin: 16px 0 0; padding: 14px 16px; border-radius: 16px; font-weight: 800; display: none; }
    .feedback.correct, .feedback.incorrect { display: block; }
    .correct { color: #166534; background: #dcfce7; }
    .incorrect { color: #991b1b; background: #fee2e2; }
    #explainBox { display: none; white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere; margin-top: 14px; background: #f8fafc; padding: 16px; border-radius: 18px; border: 1px solid var(--line); color: #344054; }
    #explainBox:not(:empty) { display: block; }

    .modal-backdrop { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(15, 23, 42, 0.38); backdrop-filter: blur(8px); padding: 22px; overflow: auto; }
    .modal-backdrop.open { display: grid; place-items: start center; }
    .modal { width: min(720px, 100%); margin-top: 6vh; padding: 22px; }
    .modal-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
    .list-item { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--line); }
    .list-item:last-child { border-bottom: 0; }
    .list-title { min-width: 0; overflow: hidden; text-overflow: ellipsis; }
    .mini-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .mini-actions button, .jump-grid button { padding: 8px 12px; font-size: 13px; }
    .empty { color: var(--muted); padding: 20px 0; }

    .jump-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px; }
    .jump-grid button { border-radius: 14px; background: #e5e7eb; color: #111827; box-shadow: none; }
    .jump-grid button.done { background: #dbeafe; color: #1d4ed8; }
    .jump-grid button.current { outline: 3px solid rgba(37,99,235,0.25); background: var(--primary); color: #ffffff; }

    #chat-panel { position: fixed; right: 20px; bottom: 82px; width: min(390px, calc(100vw - 32px)); height: min(560px, calc(100vh - 130px)); display: none; flex-direction: column; z-index: 900; overflow: hidden; }
    #chat-log { flex: 1; overflow: auto; padding: 16px; font-size: 14px; }
    .chat-row { padding: 12px; border-radius: 16px; background: #f8fafc; margin-bottom: 10px; border: 1px solid var(--line); }
    .chat-input-row { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--line); background: rgba(255,255,255,0.76); }
    #chat-input { flex: 1; min-width: 0; border: 1px solid var(--line); border-radius: 999px; padding: 11px 14px; outline: none; }
    #open-chat { position: fixed; right: 20px; bottom: 22px; width: 52px; height: 52px; padding: 0; display: grid; place-items: center; z-index: 901; font-size: 20px; }

    .toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(24px); opacity: 0; pointer-events: none; z-index: 2000; padding: 12px 16px; border-radius: 999px; background: rgba(17,24,39,0.92); color: #fff; font-weight: 750; transition: opacity .2s ease, transform .2s ease; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 860px) {
      .app-shell { width: min(100% - 22px, 920px); padding-top: 16px; }
      .composer, #quiz-container { border-radius: 24px; }
      .quiz-top { flex-direction: column; }
      #top-btns { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <section class="composer card" aria-labelledby="input-title">
        <div class="composer-header">
          <div>
            <h2 id="input-title">导入题库</h2>
            <p class="muted">每题包含题干、A-H 选项和以 * 开头的答案。</p>
            <p class="prompt-hint">导入题库前请用 AI 工具整理格式，<button id="copy-prompt-btn" class="prompt-copy" type="button">点击复制 prompt</button></p>
          </div>
        </div>
        <textarea id="raw-input" placeholder="示例：&#10;1. HTML 的全称是什么？&#10;A. Hyper Text Markup Language&#10;B. High Text Machine Language&#10;*A"></textarea>
        <div class="actions">
          <button id="build-btn">生成刷题</button>
          <button id="save-btn" class="secondary">保存题库</button>
          <button id="show-bank-btn" class="ghost">题库</button>
          <button id="fav-quiz-btn" class="success-btn" style="display:none">刷收藏题</button>
          <button id="manage-fav-btn" class="purple-btn" style="display:none">管理收藏夹</button>
        </div>
      </section>
    </section>

    <section id="quiz-container" class="card" aria-live="polite">
      <div class="quiz-top">
        <div class="quiz-title">
          <div id="q-num"></div>
          <p id="question-text"></p>
        </div>
        <div id="top-btns">
          <button id="jump-btn" class="icon-btn" title="题号导航" aria-label="题号导航">⌘</button>
          <button id="fav-btn" class="icon-btn" title="收藏/取消收藏" aria-label="收藏/取消收藏">★</button>
        </div>
      </div>
      <div id="options-area"></div>
      <div class="quiz-actions">
        <button id="prev-btn" class="ghost" style="display:none">上一题</button>
        <button id="action-btn" disabled>提交</button>
        <button id="explainBtn" class="success-btn" style="display:none">生成解析</button>
      </div>
      <p id="feedback" class="feedback"></p>
      <pre id="explainBox"></pre>
    </section>
  </main>

  <div id="fav-manager" class="modal-backdrop"><div class="modal card"><div class="modal-head"><h2>收藏夹</h2><button class="ghost" data-close="fav-manager">关闭</button></div><div id="fav-list"></div></div></div>
  <div id="jump-modal" class="modal-backdrop"><div class="modal card"><div class="modal-head"><h2>跳转到题号</h2><button class="ghost" data-close="jump-modal">关闭</button></div><div id="jump-grid" class="jump-grid"></div></div></div>
  <div id="bank-modal" class="modal-backdrop"><div class="modal card"><div class="modal-head"><h2>已保存题库</h2><button class="ghost" data-close="bank-modal">关闭</button></div><div id="bank-list"></div></div></div>

  <aside id="chat-panel" class="card" aria-label="AI 对话面板">
    <div id="chat-log"></div>
    <div class="chat-input-row">
      <input id="chat-input" placeholder="问 AI 解析老师…" autocomplete="off">
      <button id="chat-send">发送</button>
    </div>
  </aside>
  <button id="open-chat" aria-label="打开 AI 对话">AI</button>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const $ = id => document.getElementById(id);
      const rawInput = $('raw-input');
      const copyPromptBtn = $('copy-prompt-btn');
      const buildBtn = $('build-btn');
      const saveBtn = $('save-btn');
      const showBankBtn = $('show-bank-btn');
      const favQuizBtn = $('fav-quiz-btn');
      const manageFavBtn = $('manage-fav-btn');
      const quizBox = $('quiz-container');
      const qNum = $('q-num');
      const qText = $('question-text');
      const optsArea = $('options-area');
      const actionBtn = $('action-btn');
      const prevBtn = $('prev-btn');
      const feedback = $('feedback');
      const favBtn = $('fav-btn');
      const jumpBtn = $('jump-btn');
      const favManager = $('fav-manager');
      const favList = $('fav-list');
      const jumpModal = $('jump-modal');
      const jumpGrid = $('jump-grid');
      const bankModal = $('bank-modal');
      const bankList = $('bank-list');
      const explainBtn = $('explainBtn');
      const explainBox = $('explainBox');
      const chatPanel = $('chat-panel');
      const chatLog = $('chat-log');
      const chatInput = $('chat-input');
      const chatSend = $('chat-send');
      const openChat = $('open-chat');
      const toast = $('toast');

      let quiz = [];
      let current = 0;
      let userChoices = [];
      let gradedStatus = [];
      let favorites = safeLoad('favorites', []);
      let quizBank = safeLoad('quizBank', []);
      const explanationCache = {};

      function safeLoad(key, fallback) {
        try {
          const value = JSON.parse(localStorage.getItem(key) || 'null');
          return Array.isArray(value) ? value : fallback;
        } catch (_) {
          return fallback;
        }
      }

      function notify(message) {
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(notify.timer);
        notify.timer = setTimeout(() => toast.classList.remove('show'), 1800);
      }

      const saveStorage = (key, value) => localStorage.setItem(key, JSON.stringify(value));
      const normalizeLetter = letter => String(letter || '').replace(/[Ａ-Ｈ]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 65248)).toUpperCase();
      
      const normalizeQuestion = q => {
        return String(q || '')
          .trim()
          .replace(/^\s*(?:\[?\d+\]?|【?\d+】?|\(?\d+\)?)\s*[．\.,，、\s)]\s*/, '');
      };

      const isSameSet = (a = [], b = []) => [...a].sort().join('') === [...b].sort().join('');
      const formatPrompt = `帮我把题库整理一下，按照

1.世界上最高的山峰是什么？

A. 乔戈里峰

B. 珠穆朗玛峰

C. 乞力马扎罗山

*B



2.以下哪些属于计算机的输入设备？（多选）

A. 鼠标 B. 键盘 C. 显示器 D. 打印机

*AB

这样的格式重新生成，星号后面只要正确答案`;

      copyPromptBtn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(formatPrompt);
          notify('Prompt 已复制');
        } catch (_) {
          const helper = document.createElement('textarea');
          helper.value = formatPrompt;
          helper.style.position = 'fixed';
          helper.style.opacity = '0';
          document.body.appendChild(helper);
          helper.select();
          document.execCommand('copy');
          helper.remove();
          notify('Prompt 已复制');
        }
      });

      function updateFavButtons() {
        const visible = favorites.length ? 'inline-block' : 'none';
        favQuizBtn.style.display = visible;
        manageFavBtn.style.display = visible;
      }
      updateFavButtons();

      function parseText(text) {
        const lines = text.replace(/\r/g, '').split('\n');
        const result = [];
        let currentQuestion = null;

        const pushQuestion = () => {
          if (!currentQuestion) return;
          currentQuestion.question = normalizeQuestion(currentQuestion.question);
          currentQuestion.answer = [...new Set(currentQuestion.answer.map(normalizeLetter).filter(Boolean))];
          currentQuestion.options = currentQuestion.options.filter(([label]) => label);
          if (currentQuestion.question && currentQuestion.options.length && currentQuestion.answer.length) {
            result.push(currentQuestion);
          }
        };

        for (const rawLine of lines) {
          const line = rawLine.trim();
          if (!line) continue;

          const answerMatch = line.match(/^\*\s*([A-HＡ-Ｈ]+)/i) || line.match(/^(?:答案|正确答案)[:：]\s*([A-HＡ-Ｈ\s,，、]+)/i);
          if (answerMatch && currentQuestion) {
            const pureLetters = answerMatch[1].replace(/[\s,，、]+/g, '').split('');
            currentQuestion.answer = pureLetters;
            continue;
          }

          const optionMatches = [...line.matchAll(/([A-HＡ-Ｈ])\s*[\.．、\s)]\s*([^A-HＡ-Ｈ]*?)(?=\s+[A-HＡ-Ｈ]\s*[\.．、\s)]|$)/gi)];
          if (optionMatches.length) {
            if (!currentQuestion) currentQuestion = { question: '', options: [], answer: [] };
            optionMatches.forEach(match => {
              const label = normalizeLetter(match[1]);
              const optionText = match[2].trim();
              if (label && optionText) currentQuestion.options.push([label, optionText]);
            });
            continue;
          }

          pushQuestion();
          currentQuestion = { question: line, options: [], answer: [] };
        }

        pushQuestion();
        return result;
      }

      function isFav(question) {
        const text = typeof question === 'string' ? question : question.question;
        return favorites.some(item => item.question === text);
      }

      function toggleFav(question) {
        const index = favorites.findIndex(item => item.question === question.question);
        if (index > -1) {
          favorites.splice(index, 1);
          notify('已取消收藏');
        } else {
          favorites.push(structuredClone(question));
          notify('已收藏');
        }
        saveStorage('favorites', favorites);
        updateFavButtons();
        favBtn.classList.toggle('faved', index === -1);
      }

      function renderQuestion() {
        if (!quiz[current]) return;
        const question = quiz[current];
        qNum.textContent = `题目 ${current + 1} / ${quiz.length}`;
        qText.textContent = question.question;
        optsArea.innerHTML = '';
        feedback.textContent = '';
        feedback.className = 'feedback';
        explainBox.textContent = '';
        explainBtn.style.display = 'none';
        actionBtn.style.display = 'inline-block';
        favBtn.style.display = 'inline-grid';
        jumpBtn.style.display = 'inline-grid';

        const multi = question.answer.length > 1;
        question.options.forEach(([label, text]) => {
          const option = document.createElement('label');
          option.className = 'option';
          const input = document.createElement('input');
          input.type = multi ? 'checkbox' : 'radio';
          input.name = `option-${current}`;
          input.value = label;
          input.addEventListener('change', () => {
            actionBtn.disabled = false;
            gradedStatus[current] = false;
            feedback.textContent = '';
            feedback.className = 'feedback';
            actionBtn.textContent = '提交';
            explainBox.textContent = '';
            explainBtn.style.display = 'none';
          });
          const content = document.createElement('span');
          content.innerHTML = `<strong>${label}.</strong> ${escapeHtml(text)}`;
          option.append(input, content);
          optsArea.appendChild(option);
        });

        if (userChoices[current]) {
          optsArea.querySelectorAll('input').forEach(input => {
            input.checked = userChoices[current].includes(input.value);
          });
        }

        const wasGraded = Boolean(gradedStatus[current]);
        actionBtn.textContent = wasGraded ? (current < quiz.length - 1 ? '下一题' : '完成') : '提交';
        actionBtn.disabled = !userChoices[current]?.length;
        prevBtn.style.display = current > 0 ? 'inline-block' : 'none';
        favBtn.classList.toggle('faved', isFav(question.question));
        favBtn.onclick = () => toggleFav(question);

        if (wasGraded) showFeedback();
        if (explanationCache[current]) {
          explainBox.innerHTML = explanationCache[current]; // 修复缓存读取使用 innerHTML
          explainBtn.style.display = 'inline-block';
        }
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char]));
      }

      function showFeedback() {
        const correct = quiz[current].answer;
        const selected = userChoices[current] || [];
        const ok = isSameSet(selected, correct);
        feedback.textContent = ok ? '正确，继续保持。' : `错误，正确答案：${correct.sort().join('、')}`;
        feedback.className = `feedback ${ok ? 'correct' : 'incorrect'}`;
        explainBtn.style.display = 'inline-block';
      }

      function submitAnswer() {
        const selected = [...optsArea.querySelectorAll('input')].filter(input => input.checked).map(input => input.value).sort();
        if (!selected.length) {
          notify('请先选择答案');
          return;
        }
        userChoices[current] = selected;
        gradedStatus[current] = true;
        actionBtn.textContent = current < quiz.length - 1 ? '下一题' : '完成';
        showFeedback();
      }

      actionBtn.addEventListener('click', () => {
        if (gradedStatus[current]) {
          if (current < quiz.length - 1) {
            current += 1;
            renderQuestion();
          } else {
            endQuiz();
          }
        } else {
          submitAnswer();
        }
      });

      prevBtn.addEventListener('click', () => {
        if (current > 0) {
          current -= 1;
          renderQuestion();
        }
      });

      function endQuiz() {
        const score = quiz.reduce((sum, question, index) => sum + (isSameSet(userChoices[index], question.answer) ? 1 : 0), 0);
        qNum.textContent = '练习完成';
        qText.textContent = `得分 ${score} / ${quiz.length}`;
        optsArea.innerHTML = '';
        actionBtn.style.display = 'none';
        prevBtn.style.display = 'none';
        favBtn.style.display = 'none';
        jumpBtn.style.display = 'none';
        feedback.textContent = `正确率 ${Math.round((score / quiz.length) * 100)}%`;
        feedback.className = 'feedback correct';
        explainBtn.style.display = 'none';
        explainBox.textContent = '';
      }

      function startQuiz(text, fromFavorites = false) {
        quiz = fromFavorites ? favorites.map(item => structuredClone(item)) : parseText(text);
        if (!quiz.length) {
          notify('题库为空或格式不正确');
          return;
        }
        current = 0;
        userChoices = [];
        gradedStatus = [];
        Object.keys(explanationCache).forEach(key => delete explanationCache[key]);
        quizBox.style.display = 'block';
        renderQuestion();
        quizBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      buildBtn.addEventListener('click', () => startQuiz(rawInput.value.trim(), false));
      favQuizBtn.addEventListener('click', () => startQuiz('', true));

      document.addEventListener('keydown', event => {
        if (document.activeElement === rawInput || document.activeElement === chatInput) return;
        if (event.key >= '1' && event.key <= '8') {
          const index = Number(event.key) - 1;
          const letter = String.fromCharCode('A'.charCodeAt(0) + index);
          const input = optsArea.querySelector(`input[value="${letter}"]`);
          if (input) {
            if (input.type === 'checkbox') input.checked = !input.checked;
            else input.checked = true;
            input.dispatchEvent(new Event('change'));
          }
        } else if (event.key === 'Enter' && quizBox.style.display !== 'none') {
          event.preventDefault();
          if (!actionBtn.disabled && actionBtn.style.display !== 'none') actionBtn.click();
        }
      });

      saveBtn.addEventListener('click', () => {
        const text = rawInput.value.trim();
        if (!text) {
          notify('题库内容为空');
          return;
        }
        const name = prompt('题库名称');
        if (!name?.trim()) return;
        quizBank.push({ name: name.trim(), text, createdAt: Date.now() });
        saveStorage('quizBank', quizBank);
        notify('题库已保存');
      });

      showBankBtn.addEventListener('click', () => {
        renderBank();
        openModal(bankModal);
      });

      function renderBank() {
        bankList.innerHTML = '';
        if (!quizBank.length) {
          bankList.innerHTML = '<div class="empty">暂无题库</div>';
          return;
        }
        quizBank.forEach((bank, index) => {
          const item = document.createElement('div');
          item.className = 'list-item';
          const title = document.createElement('div');
          title.className = 'list-title';
          title.textContent = bank.name;
          const actions = document.createElement('div');
          actions.className = 'mini-actions';
          const load = document.createElement('button');
          load.textContent = '加载';
          load.onclick = () => {
            rawInput.value = bank.text;
            closeModal(bankModal);
            startQuiz(bank.text, false);
          };
          const del = document.createElement('button');
          del.className = 'danger-btn';
          del.textContent = '删除';
          del.onclick = () => {
            if (confirm('确认删除这个题库？')) {
              quizBank.splice(index, 1);
              saveStorage('quizBank', quizBank);
              renderBank();
            }
          };
          actions.append(load, del);
          item.append(title, actions);
          bankList.appendChild(item);
        });
      }

      manageFavBtn.addEventListener('click', () => {
        renderFav();
        openModal(favManager);
      });

      function renderFav() {
        favList.innerHTML = '';
        if (!favorites.length) {
          favList.innerHTML = '<div class="empty">暂无收藏</div>';
          updateFavButtons();
          return;
        }
        favorites.forEach((question, index) => {
          const item = document.createElement('div');
          item.className = 'list-item';
          const title = document.createElement('div');
          title.className = 'list-title';
          title.textContent = `${index + 1}. ${question.question}`;
          const actions = document.createElement('div');
          actions.className = 'mini-actions';
          const del = document.createElement('button');
          del.className = 'danger-btn';
          del.textContent = '删除';
          del.onclick = () => {
            favorites.splice(index, 1);
            saveStorage('favorites', favorites);
            updateFavButtons();
            renderFav();
            if (quiz[current]) favBtn.classList.toggle('faved', isFav(quiz[current].question));
          };
          actions.append(del);
          item.append(title, actions);
          favList.appendChild(item);
        });
      }

      jumpBtn.addEventListener('click', () => {
        renderJump();
        openModal(jumpModal);
      });

      function renderJump() {
        jumpGrid.innerHTML = '';
        quiz.forEach((_, index) => {
          const button = document.createElement('button');
          button.textContent = String(index + 1);
          if (gradedStatus[index]) button.classList.add('done');
          if (index === current) button.classList.add('current');
          button.onclick = () => {
            current = index;
            renderQuestion();
            closeModal(jumpModal);
          };
          jumpGrid.appendChild(button);
        });
      }

      function openModal(modal) {
        modal.classList.add('open');
      }

      function closeModal(modal) {
        modal.classList.remove('open');
      }

      document.querySelectorAll('[data-close]').forEach(button => {
        button.addEventListener('click', () => closeModal($(button.dataset.close)));
      });
      document.querySelectorAll('.modal-backdrop').forEach(backdrop => {
        backdrop.addEventListener('click', event => {
          if (event.target === backdrop) closeModal(backdrop);
        });
      });

      async function streamExplain(prompt, key, target) {
        try {
          const response = await fetch('https://quizpass.vercel.app/api/explain', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt })
          });
          if (!response.ok || !response.body) throw new Error('AI 服务暂时不可用');
          const reader = response.body.getReader();
          const decoder = new TextDecoder('utf-8');
          let buffer = '';
          let text = '';
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });

            // 👉 新增：拦截并显示 DeepSeek 的官方报错（如余额不足、Key错误）
            if (buffer.trim().startsWith('{"error"')) {
              try {
                const errData = JSON.parse(buffer);
                text = `⚠️ DeepSeek 报错: ${errData.error?.message || errData.error?.code || '未知错误'}`;
                target.innerHTML = `<span style="color:#dc2626; font-weight:bold;">${text}</span>`;
                return; // 遇到报错直接结束
              } catch (_) {}
            }

            const parts = buffer.split('\n\n');
            buffer = parts.pop();
            for (const part of parts) {
              if (!part.startsWith('data:')) continue;
              const data = part.slice(5).trim();
              if (data === '[DONE]') continue;
              let delta = '';
              try {
                const parsed = JSON.parse(data);
                delta = parsed.choices?.[0]?.delta?.content || parsed.error || '';
              } catch (_) {}
              text += delta;
              
              // 简单的正则匹配换行和加粗，优化 AI 排版显示
              target.innerHTML = escapeHtml(text)
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            }
          }
          if (!text) {
            target.textContent = '暂无解析内容，请稍后再试。';
          } else {
            if (key !== null) explanationCache[key] = target.innerHTML; // 修复缓存存储使用 innerHTML
          }
        } catch (error) {
          target.textContent = error.message || '解析失败，请稍后再试。';
        }
      }

      explainBtn.addEventListener('click', () => {
        if (explanationCache[current]) {
          explainBox.innerHTML = explanationCache[current]; // 修复缓存读取使用 innerHTML
          return;
        }
        explainBox.textContent = '解析生成中…';
        const optionsText = [...optsArea.querySelectorAll('label')].map(label => label.innerText).join('\n');
        const selected = (userChoices[current] || []).join('、') || '未选择';
        const prompt = `题目：${qText.textContent}\n选项：\n${optionsText}\n我选择的答案：${selected}\n正确答案：${quiz[current].answer.join('、')}\n请给出简洁解析（200字内）。`;
        streamExplain(prompt, current, explainBox);
      });

      openChat.addEventListener('click', () => {
        chatPanel.style.display = chatPanel.style.display === 'flex' ? 'none' : 'flex';
        if (chatPanel.style.display === 'flex') chatInput.focus();
      });

      chatSend.addEventListener('click', () => {
        const value = chatInput.value.trim();
        if (!value) return;
        chatInput.value = '';
        chatStream(value);
      });
      chatInput.addEventListener('keydown', event => {
        if (event.key === 'Enter') {
          event.preventDefault();
          chatSend.click();
        }
      });

      async function chatStream(message) {
        const row = document.createElement('div');
        row.className = 'chat-row';
        const user = document.createElement('div');
        user.innerHTML = `<strong>你：</strong>${escapeHtml(message)}`;
        const ai = document.createElement('div');
        ai.innerHTML = '<strong>AI：</strong><span></span>';
        const span = ai.querySelector('span');
        row.append(user, ai);
        chatLog.appendChild(row);
        chatLog.scrollTop = chatLog.scrollHeight;
        await streamExplain(message, null, span);
        chatLog.scrollTop = chatLog.scrollHeight;
      }
    });
  </script>
</body>
</html>
